name: Docker Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ Checkout repo
      uses: actions/checkout@v4

    - name: 🔑 Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🛠️ Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🐳 Build & Push pipeline
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sentiment_pipeline:latest

    - name: 🐳 Build & Push inference API
      uses: docker/build-push-action@v5
      with:
        context: .
        file: fastapi_app/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sentiment_inference_api:latest


# ⚠️ publish-local ONLY for local usage
# Do NOT use in CI
