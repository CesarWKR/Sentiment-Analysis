# =====================================================
# Docker Compose - Sentiment Analysis Platform
# =====================================================
# Default behavior:
# - Infrastructure services only (Kafka, PostgreSQL)
# - Unified ML pipeline (main.py)
# - Inference API
#
# Optional profiles:
# - dev: enables pgAdmin and source code mounting
# - gpu: enables GPU support for training
# =====================================================

services:
  # ---------------------------------------------------
  # Zookeeper (required by Kafka)
  # ---------------------------------------------------
  zookeeper:
    image: bitnami/zookeeper:3.9.1-debian-12-r0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    expose:
      - "2181"


  # ---------------------------------------------------
  # Kafka broker
  # ---------------------------------------------------
  kafka:
    image: bitnami/kafka:3.7.0-debian-12-r0
    depends_on:
      - zookeeper
    expose:
      - "9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Internal communication inside the Docker network
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      # Single broker setup (development & PoC friendly)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1


  # ---------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------
  postgres:
    image: bitnami/postgresql:16.3.0-debian-12-r0
    env_file:
      - .env
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  # ---------------------------------------------------
  # pgAdmin (development only)
  # ---------------------------------------------------
  # This service is useful for local development and
  # should NOT be enabled in production environments.
  pgadmin:
    image: dpage/pgadmin4:9.2
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - dev


  # producer:
  #   build:
  #     context: ./producer
  #     dockerfile: Dockerfile
  #   image: producer:latest  
  #   container_name: producer
  #   depends_on:
  #     - zookeeper
  #     - kafka
  #   env_file:
  #     - .env

  # consumer:
  #   build:
  #     context: ./consumer
  #     dockerfile: Dockerfile
  #   image: consumer:latest
  #   container_name: consumer
  #   depends_on:
  #     - zookeeper
  #     - kafka
  #     - postgres
  #   env_file:
  #     - .env

  # bigquery_loader:
  #   build: ./bigquery_loader
  #   depends_on:
  #     - consumer
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./secrets:/secrets


  # ---------------------------------------------------
  # Unified ML Pipeline
  # ---------------------------------------------------
  # This container runs the entire pipeline:
  # - Reddit data extraction
  # - Kafka producer & consumer
  # - Data cleaning & transformation
  # - Model training and export
  #
  # All orchestration happens inside main.py
  # ---------------------------------------------------
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      # dockerfile: ./Dockerfile
      args:
        USE_GPU: true
    image: sentiment_pipeline:latest
    container_name: sentiment_pipeline
    depends_on:
      - kafka
      - postgres
    env_file:
      - .env
    command: ["python", "main.py"]

    # -------------------------------------------------
    # Profiles
    # -------------------------------------------------
    profiles:
      - dev
      - gpu

    # -------------------------------------------------
    # Dev Container support
    # -------------------------------------------------
    # In development, this volume allows live code
    # synchronization with the host (VS Code Remote Containers)
    # volumes:
    #   - .:/app
    

    # -------------------------------------------------
    # GPU support (training)
    # -------------------------------------------------
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]


  # ---------------------------------------------------
  # Inference API (FastAPI)
  # ---------------------------------------------------
  # This service loads a trained model and exposes
  # prediction endpoints for testing and production use
  inference_api:
    build:
      context: .
      dockerfile: fastapi_app/Dockerfile
    image: sentiment_inference_api:latest
    container_name: sentiment_inference_api
    depends_on:
      - postgres
    env_file:
      - .env

    # Expose API port (remove in pure production behind a gateway)
    ports:
      - "8000:8000"  

    environment:
      # Path where the trained model is stored inside the container
      MODEL_DIR: /app/Roberta_sentiment_model

# =====================================================
# Named volumes
# =====================================================
volumes:
  postgres_data:
  pgadmin_data:

